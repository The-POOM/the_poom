<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POOM Captive Portal</title>
  <style>
    :root {
      --bg: #050816;
      --card-bg: #0f172a;
      --accent: #38bdf8;
      --accent-soft: #e0f2fe;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, var(--bg) 55%);
      color: var(--text-main);
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px 20px 20px;
      box-shadow:
        0 18px 45px rgba(15, 23, 42, 0.8),
        0 0 0 1px rgba(148, 163, 184, 0.2);
    }

    h1 {
      font-size: 1.6rem;
      margin: 0 0 6px;
      text-align: center;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 18px;
    }

    .form-section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    label {
      font-size: 0.85rem;
      margin-top: 6px;
      margin-bottom: 2px;
      color: var(--text-main);
    }

    .form-control {
      display: block;
      width: 100%;
      padding: 0.55rem 0.7rem;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-main);
      background-color: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.6);
      border-radius: 8px;
      outline: none;
      transition:
        border-color 0.15s ease-in-out,
        box-shadow 0.15s ease-in-out,
        background-color 0.15s ease-in-out;
    }

    .form-control:focus {
      border-color: var(--accent);
      background-color: #020617;
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
    }

    .btn {
      display: inline-block;
      width: 100%;
      margin-top: 14px;
      padding: 0.55rem 0.75rem;
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.5;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      border-radius: 999px;
      border: none;
      color: #020617;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      box-shadow: 0 8px 22px rgba(56, 189, 248, 0.55);
      transition:
        transform 0.1s ease,
        box-shadow 0.1s ease,
        opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.7);
      opacity: 0.95;
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.9);
    }

    .note {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to <span>POOM</span> Wi-Fi</h1>
    <p class="subtitle">
      Connect and leave your info — we’ll keep you updated on the POOM Kickstarter launch.
    </p>

    <p class="form-section-title">Access form</p>
    <form action="/validate" method="get" class="row">
      <label for="user1">Email</label>
      <input type="email" id="user1" name="user1" class="form-control" required>

      <label for="user2">Name / Handle</label>
      <input type="text" id="user2" name="user2" class="form-control">

      <label for="user3">How did you hear about POOM?</label>
      <input type="text" id="user3" name="user3" class="form-control">

      <label for="user4">What would you like to build with POOM?</label>
      <input type="text" id="user4" name="user4" class="form-control">

      <button type="submit" class="btn">Join the POOM List</button>
    </form>

    <p class="note">
      <strong>Note:</strong> If the connection is unstable, try changing the Wi-Fi channel in POOM settings.
    </p>
  </div>
</body>
</html>
