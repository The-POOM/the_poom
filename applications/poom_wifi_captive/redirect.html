<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POOM — Thank You</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 40px 16px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1e293b 0, #050816 55%);
      color: #e5e7eb;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      font-size: 16px;
      color: #cbd5f5;
      max-width: 380px;
      margin: 0 auto;
    }
    a {
      display: inline-block;
      margin-top: 25px;
      text-decoration: none;
      color: #38bdf8;
      font-weight: bold;
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.9);
      transition:
        transform 0.1s ease,
        box-shadow 0.1s ease,
        background-color 0.15s ease,
        color 0.15s ease;
    }
    a:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.95);
      background: rgba(15, 23, 42, 1);
      text-decoration: none;
    }
